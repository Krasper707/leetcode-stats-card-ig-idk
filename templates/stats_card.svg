<!-- templates/stats_card.svg - ENHANCED VERSION -->
<svg width="550" height="280" viewBox="0 0 550 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
    <title id="title">{{ username }}'s LeetCode Stats</title>
    
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=VT323&amp;display=swap');
            
            .text { font-family: 'VT323', monospace; font-size: 20px; }
            .header-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 12px; fill: #8b949e; }
            .window-header { fill: #161b22; }
            .window-body { fill: {{ theme.background | default('#0d1117') }}; stroke: {{ theme.border | default('#30363d') }}; stroke-width: 2; }
            
            .prompt { fill: {{ theme.prompt | default('#58a6ff') }}; }
            .command { fill: {{ theme.command | default('#d2a8ff') }}; }
            .output-label { fill: {{ theme.output_label | default('#8b949e') }}; }
            .output-value { fill: {{ theme.output_value | default('#ffffff') }}; }
            
            .bar-easy { fill: #2dbd5c; }
            .bar-medium { fill: #febd2e; }
            .bar-hard { fill: #ff2d55; }
            
            .stats-glow { filter: url(#glow); }
            
            @keyframes flicker {
                0% { opacity: 0.97; }
                5% { opacity: 0.9; }
                10% { opacity: 0.98; }
                100% { opacity: 1; }
            }
            .terminal-content { animation: flicker 0.15s infinite alternate; }
        </style>
        
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <pattern id="scanlines" width="100%" height="4" patternUnits="userSpaceOnUse">
            <path d="M 0 0 L 550 0" stroke="rgba(0,0,0,0.15)" stroke-width="2" fill="none" />
        </pattern>
    </defs>

    <!-- Window Frame -->
    <rect x="2" y="2" width="546" height="276" rx="10" class="window-body" />
    
    <!-- Header -->
    <path d="M 2 12 a 10 10 0 0 1 10 -10 h 526 a 10 10 0 0 1 10 10 v 22 h -546 z" class="window-header" />
    <circle cx="20" cy="18" r="6" fill="#ff5f56" />
    <circle cx="40" cy="18" r="6" fill="#ffbd2e" />
    <circle cx="60" cy="18" r="6" fill="#27c93f" />
    <text x="275" y="22" text-anchor="middle" class="header-text">bash — leetcode-fetch — 550x280</text>

    <!-- Scanline Overlay -->
    <rect x="2" y="34" width="546" height="244" fill="url(#scanlines)" pointer-events="none" />

    <g class="text stats-glow terminal-content">
        <!-- Input Command -->
        <g transform="translate(25, 70)">
            <text class="prompt">root@leetcode:~#</text>
            <text x="145" class="command">./stats --user {{ username }}</text>
        </g>

        <!-- Stats Block -->
        <g transform="translate(25, 105)">
            <!-- Easy -->
            <text class="output-label" y="0">EASY  </text>
            <text class="output-value" x="80" y="0">[{{ easy_solved_str | default('000') }}/{{ total_easy }}]</text>
            <text class="bar-easy" x="230" y="0">{{ '█' * ((easy_solved_num * 15 // total_easy) if total_easy > 0 else 0) }}{{ '─' * (15 - ((easy_solved_num * 15 // total_easy) if total_easy > 0 else 0)) }}</text>
            
            <!-- Medium -->
            <text class="output-label" y="35">MEDIUM</text>
            <text class="output-value" x="80" y="35">[{{ medium_solved_str | default('000') }}/{{ total_medium }}]</text>
            <text class="bar-medium" x="230" y="35">{{ '█' * ((medium_solved_num * 15 // total_medium) if total_medium > 0 else 0) }}{{ '─' * (15 - ((medium_solved_num * 15 // total_medium) if total_medium > 0 else 0)) }}</text>
            
            <!-- Hard -->
            <text class="output-label" y="70">HARD  </text>
            <text class="output-value" x="80" y="70">[{{ hard_solved_str | default('000') }}/{{ total_hard }}]</text>
            <text class="bar-hard" x="230" y="70">{{ '█' * ((hard_solved_num * 15 // total_hard) if total_hard > 0 else 0) }}{{ '─' * (15 - ((hard_solved_num * 15 // total_hard) if total_hard > 0 else 0)) }}</text>

            <!-- Line Separator -->
            <text class="output-label" y="95" opacity="0.3">────────────────────────────────────────────</text>

            <!-- Extra Info -->
            <text class="output-label" y="120">RANK: <tspan class="output-value">{{ rank | default('N/A') }}</tspan></text>
            <text class="output-label" x="230" y="120">TOTAL SOLVED: <tspan class="output-value">{{ total_solved_str }}</tspan></text>
        </g>

        <!-- Cursor -->
        <rect x="25" y="240" width="12" height="20" fill="{{ theme.prompt | default('#58a6ff') }}">
            <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" />
        </rect>
    </g>
</svg>