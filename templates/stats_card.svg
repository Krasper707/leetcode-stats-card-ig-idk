<svg width="550" height="280" viewBox="0 0 550 280" xmlns="http://www.w3.org/2000/svg" role="img">
    <title>{{ username }}'s LeetCode Stats</title>
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=VT323&amp;display=swap');
            .text { font-family: 'VT323', monospace; font-size: 22px; }
            .header-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 12px; fill: #8b949e; }
            .window-header { fill: #161b22; }
            .window-body { fill: {{ theme.background }}; stroke: {{ theme.border }}; stroke-width: 2; }
            .prompt { fill: {{ theme.prompt }}; }
            .command { fill: {{ theme.command }}; }
            .output-label { fill: {{ theme.output_label }}; }
            .output-value { fill: {{ theme.output_value }}; }
            .bar-bg { fill: rgba(255,255,255,0.08); }
        </style>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <rect x="2" y="2" width="546" height="276" rx="10" class="window-body" />
    <path d="M 2 12 a 10 10 0 0 1 10 -10 h 526 a 10 10 0 0 1 10 10 v 22 h -546 z" class="window-header" />
    <circle cx="20" cy="18" r="6" fill="#ff5f56" /><circle cx="40" cy="18" r="6" fill="#ffbd2e" /><circle cx="60" cy="18" r="6" fill="#27c93f" />
    <text x="275" y="22" text-anchor="middle" class="header-text">bash — leetcode-fetch — 550x280</text>

    <g class="text" filter="url(#glow)">
        <g transform="translate(25, 75)">
            <text class="prompt">root@leetcode:~#</text>
            <text x="165" class="command">./stats --user {{ username }}</text>
        </g>

        <g transform="translate(25, 115)">
            <!-- EASY -->
            <text class="output-label" y="0">EASY</text>
            <text class="output-value" x="85" y="0">[{{ easy_solved_str }}/{{ total_easy }}]</text>
            <rect x="240" y="-14" width="180" height="12" rx="2" class="bar-bg" />
            <rect x="240" y="-14" width="{{ (easy_solved_num / total_easy) * 180 }}" height="12" rx="2" fill="#2dbd5c" />
            
            <!-- MEDIUM -->
            <text class="output-label" y="40">MEDIUM</text>
            <text class="output-value" x="85" y="40">[{{ medium_solved_str }}/{{ total_medium }}]</text>
            <rect x="240" y="26" width="180" height="12" rx="2" class="bar-bg" />
            <rect x="240" y="26" width="{{ (medium_solved_num / total_medium) * 180 }}" height="12" rx="2" fill="#febd2e" />
            
            <!-- HARD -->
            <text class="output-label" y="80">HARD</text>
            <text class="output-value" x="85" y="80">[{{ hard_solved_str }}/{{ total_hard }}]</text>
            <rect x="240" y="66" width="180" height="12" rx="2" class="bar-bg" />
            <rect x="240" y="66" width="{{ (hard_solved_num / total_hard) * 180 }}" height="12" rx="2" fill="#ff2d55" />

            <line x1="0" y1="105" x2="500" y2="105" stroke="{{ theme.border }}" stroke-width="1" opacity="0.3" />

            <text class="output-label" y="135">RANK: <tspan class="output-value">{{ rank }}</tspan></text>
            <text class="output-label" x="240" y="135">TOTAL SOLVED: <tspan class="output-value">{{ total_solved_str }}</tspan></text>
        </g>

        <rect x="25" y="250" width="12" height="20" fill="{{ theme.prompt }}">
            <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" />
        </rect>
    </g>
</svg>